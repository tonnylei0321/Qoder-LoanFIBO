version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: loanfibo-postgres
    environment:
      POSTGRES_DB: loanfibo
      POSTGRES_USER: loanfibo
      POSTGRES_PASSWORD: loanfibo_secret
    ports:
      - "5434:5432"
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - loanfibo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loanfibo -d loanfibo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: loanfibo-redis
    ports:
      - "6380:6379"
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - loanfibo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  graphdb:
    image: ontotext/graphdb:10.7.3
    container_name: loanfibo-graphdb
    ports:
      - "7200:7200"
    restart: always
    volumes:
      - graphdb_data:/opt/graphdb/home
      - ./docs/fibo-master_2025Q4:/opt/fibo:ro
    environment:
      GDB_HEAP_SIZE: 4g
      GDB_MIN_MEM: 1g
    networks:
      - loanfibo-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7200/rest/repositories || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  graphdb_data:
    driver: local

networks:
  loanfibo-network:
    driver: bridge
