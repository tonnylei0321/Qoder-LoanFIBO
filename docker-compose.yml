version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: loanfibo-postgres
    environment:
      POSTGRES_DB: loanfibo
      POSTGRES_USER: loanfibo
      POSTGRES_PASSWORD: loanfibo_secret
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - loanfibo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loanfibo -d loanfibo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: loanfibo-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - loanfibo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  loanfibo-network:
    driver: bridge
