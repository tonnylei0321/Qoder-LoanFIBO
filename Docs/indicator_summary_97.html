        {n:'反欺诈风险评分',    v:'0.38',  s:'a', fibo:'scf:FraudRiskScore → sasac-gov:FraudDetection',   src:'规则引擎+XGBoost'},
        {n:'数据质检门禁P0-P4', v:'P0~P2全过',s:'g',fibo:'scf:DataQualityGatePass → sasac-gov:DataGov',   src:'SASAC-GOV v4.4框架'},
        {n:'合同法律有效性',    v:'部分待确认',s:'a',fibo:'scf:ContractLegalValidity → fibo-fnd:LegalAg', src:'合同管理系统+法务'},
        {n:'贸易信用保险覆盖',  v:'未覆盖', s:'r', fibo:'scf:TradeCreditInsuranceCoverage → fibo-fnd:Ins', src:'中信保/商业信用险'},
       ]},
    ]
  }
};

function statusBadge(s, v){
  const map={g:'st-g',a:'st-a',r:'st-r',b:'st-b'};
  const label={g:'正常',a:'需关注',r:'高风险',b:'观察'};
  return `<span class="st ${map[s]||'st-b'}">${v}</span>`;
}

function renderModule(key, d){
  const dimRows = d.dims.map((dim,di)=>{
    const rows = dim.inds.map(ind=>`
      <tr>
        <td style="padding-left:32px">
          <div class="ind-name">${ind.n}</div>
          <div class="fibo" title="${ind.fibo}">${ind.fibo}</div>
        </td>
        <td>${statusBadge(ind.s, ind.v)}</td>
        <td style="font-size:11px;color:var(--color-text-secondary)">${ind.src}</td>
      </tr>`).join('');
    const tid = `t-${key}-${di}`;
    const cid = `c-${key}-${di}`;
    return `
    <div class="dim-block">
      <div class="dim-hd" onclick="toggleDim('${tid}','${cid}')">
        <div class="dim-dot" style="background:${dim.color}"></div>
        <span class="dim-name">${dim.name}</span>
        <span class="dim-cnt">${dim.inds.length}项</span>
        <span class="dim-wt" style="background:${dim.colorBg};color:${dim.color}">${dim.weight}</span>
        <span class="chevron" id="${cid}">▶</span>
      </div>
      <table class="ind-table" id="${tid}">
        <thead><tr>
          <th style="padding-left:32px;width:50%">指标名称 / 本体路径</th>
          <th style="width:18%">当前值</th>
          <th>数据来源</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');

  return `
  <div class="module">
    <div class="mod-hd">
      <div class="mod-stripe" style="background:${d.stripe}"></div>
      <span class="mod-title">${d.label}</span>
      <span class="mod-meta">${d.count}项指标</span>
      <span class="mod-score" style="background:${d.scoreBg};color:${d.scoreColor}">${d.score} · ${d.scoreLabel}</span>
    </div>
    ${dimRows}
  </div>`;
}

function toggleDim(tableId, chevId){
  const t = document.getElementById(tableId);
  const c = document.getElementById(chevId);
  const open = t.classList.toggle('open');
  c.classList.toggle('open', open);
}

const container = document.getElementById('modules');
container.innerHTML = ['pre','post','scf'].map(k=>renderModule(k,DATA[k])).join('');
</script>
